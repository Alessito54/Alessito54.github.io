<section class="section contact-section">
  <h2 class="section-title">Contact</h2>
  <div class="section-divider"></div>
  <div class="contact-grid">
    <a [href]="'mailto:' + info.email" class="contact-card">
      <span class="contact-icon">✉</span>
      <div>
        <div class="contact-label">Email</div>
        <div class="contact-value">{{ info.email }}</div>
      </div>
    </a>
    <div class="contact-card">
      <span class="contact-icon">📞</span>
      <div>
        <div class="contact-label">Phone</div>
        <div class="contact-value">{{ info.phone }}</div>
      </div>
    </div>
    <div class="contact-card">
      <span class="contact-icon">📍</span>
      <div>
        <div class="contact-label">Location</div>
        <div class="contact-value">{{ info.location }}</div>
      </div>
    </div>
    <a [href]="info.github" target="_blank" class="contact-card">
      <span class="contact-icon">🐙</span>
      <div>
        <div class="contact-label">GitHub</div>
        <div class="contact-value">Alessito54</div>
      </div>
    </a>
  </div>
</section>

<footer class="cv-footer">
  <p>© 2024 {{ info.name }} · Built with Angular</p>
</footer>
